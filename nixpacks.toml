# Railway builds with Nixpacks, whose runtime image doesn't ship the system
# libraries headless Chromium links against (first failure in production was
# libglib-2.0.so.0). Playwright's own `--with-deps` apt step can't fix this —
# it runs during `npm install`, whose failures the postinstall deliberately
# swallows — so declare the packages here where the builder installs them
# into the image itself. This is the standard Playwright Debian/Ubuntu
# dependency list for Chromium.
[phases.setup]
aptPkgs = [
  "libglib2.0-0",
  "libnss3",
  "libnspr4",
  "libdbus-1-3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libatspi2.0-0",
  "libcups2",
  "libdrm2",
  "libexpat1",
  "libx11-6",
  "libxcb1",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxrandr2",
  "libxkbcommon0",
  "libgbm1",
  "libasound2",
  "libpango-1.0-0",
  "libcairo2",
  "fonts-liberation",
]
