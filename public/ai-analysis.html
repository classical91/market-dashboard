<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Analysis · Market Command</title>
  <script src="/assets/js/settings.js"></script>
  <link rel="stylesheet" href="/assets/styles/command.css" />
  <link rel="stylesheet" href="/assets/styles/ai-analysis.css" />
</head>
<body>
<div class="app">
  <aside class="cmd-sidebar"></aside>
  <main class="cmd-main">

    <div class="cmd-page-header">
      <div>
        <div class="cmd-page-title">&#129504; AI Analysis</div>
        <div class="cmd-page-subtitle">TradingView chart snapshot + OpenAI vision read &mdash; ends in a BUY / SELL / HOLD call</div>
      </div>
      <div class="cmd-clock" id="cmd-clock"></div>
    </div>

    <div class="aia-notice" id="aia-notice" style="display:none"></div>

    <div class="aia-grid" id="aia-grid"></div>

    <div class="aia-log-section">
      <div class="aia-log-head">
        <div class="aia-log-title">Generation Log</div>
        <div class="aia-log-subtitle">When each analysis was generated, grouped by day</div>
      </div>
      <div class="aia-log" id="aia-log"></div>
    </div>

    <footer>AI Analysis &mdash; <a href="/">Overview</a> &mdash; <a href="/crypto.html">Crypto Hub</a></footer>

  </main>
</div>
<script src="/assets/js/sidebar.js"></script>
<script src="/assets/js/admin-key.js"></script>
<script>
  (function () {
    function tick() {
      var el = document.getElementById('cmd-clock');
      if (el) el.textContent = new Date().toLocaleString(undefined, {
        weekday: 'short', hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }
    tick(); setInterval(tick, 1000);

    var grid = document.getElementById('aia-grid');
    var notice = document.getElementById('aia-notice');
    var logRoot = document.getElementById('aia-log');
    var COLLAPSE_KEY = 'aia_collapsed';
    var MAX_ANALYSIS_WORDS = 150;
    // One entry per symbol, holding whichever timeframe is currently
    // selected for that card plus its last-fetched result, so switching
    // timeframes and clicking Analyze/Broadcast always act on current state
    // rather than a stale closure.
    var cardState = {};
    var availableIntervals = [];

    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, function (ch) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch];
      });
    }

    // Minimal, safe markdown-lite: escape everything first, then re-enable
    // **bold** spans and paragraph breaks so the model's formatting reads
    // cleanly without opening up to arbitrary HTML.
    function truncateWords(text, maxWords) {
      var source = String(text || '');
      if (maxWords <= 0) return '';
      var count = 0;
      var end = 0;
      var match;
      var wordPattern = /\S+/g;
      while ((match = wordPattern.exec(source))) {
        count += 1;
        if (count === maxWords) {
          end = wordPattern.lastIndex;
          break;
        }
      }
      if (count < maxWords || !wordPattern.exec(source)) return source;
      return source.slice(0, end).trimEnd();
    }

    function renderAnalysis(text) {
      if (!text) return '<span class="aia-chart-empty">No analysis yet.</span>';
      var escaped = escapeHtml(truncateWords(text, MAX_ANALYSIS_WORDS));
      var bolded = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      return bolded.split(/\n{2,}/).map(function (para) {
        return '<p>' + para.replace(/\n/g, '<br>') + '</p>';
      }).join('');
    }

    function verdictClass(verdict) {
      if (verdict === 'BUY') return 'aia-verdict aia-verdict--buy';
      if (verdict === 'SELL') return 'aia-verdict aia-verdict--sell';
      if (verdict === 'HOLD') return 'aia-verdict aia-verdict--hold';
      return 'aia-verdict';
    }

    function formatTime(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function startOfDay(d) {
      return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    }

    // Buckets a timestamp relative to today so the log (and card badges) can
    // read "Today"/"Yesterday" instead of forcing you to parse a full date
    // every time to tell how stale a generation is.
    function dayBucket(iso) {
      var d = new Date(iso);
      if (isNaN(d.getTime())) return { key: 'unknown', label: 'Unknown' };
      var diffDays = Math.round((startOfDay(new Date()) - startOfDay(d)) / 86400000);
      if (diffDays <= 0) return { key: 'today', label: 'Today' };
      if (diffDays === 1) return { key: 'yesterday', label: 'Yesterday' };
      return { key: 'day-' + startOfDay(d), label: d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) };
    }

    function cardId(symbol) {
      return 'aia-card-' + symbol.replace(/[^a-z0-9]+/gi, '-');
    }

    function hasResult(data) {
      return Boolean(data && data.chartUrl && data.analysis);
    }

    function alreadySent(data) {
      return Boolean(data && data.broadcastAt && data.generatedAt && data.broadcastAt >= data.generatedAt);
    }

    function getCollapsed() {
      try { return JSON.parse(localStorage.getItem(COLLAPSE_KEY) || 'null'); } catch { return null; }
    }

    function saveCollapsed(list) {
      try { localStorage.setItem(COLLAPSE_KEY, JSON.stringify(list)); } catch {}
    }

    function renderIntervalOptions(selected) {
      return availableIntervals.map(function (tf) {
        return '<button class="aia-tf-option' + (tf === selected ? ' active' : '') + '" type="button" data-role="tf-option" data-value="' +
          escapeHtml(tf) + '">' + escapeHtml(tf) + '</button>';
      }).join('');
    }

    function renderCard(preset) {
      return (
        '<div class="aia-card" id="' + cardId(preset.symbol) + '">' +
          '<div class="aia-card-head" data-role="head">' +
            '<div class="aia-card-symbol">' + escapeHtml(preset.label) +
              '<div class="aia-tf-menu" data-role="tf-menu">' +
                '<button class="aia-tf-select" type="button" data-role="tf" aria-haspopup="listbox" aria-expanded="false">' +
                  '<span data-role="tf-label">' + escapeHtml(preset.interval) + '</span><span class="aia-tf-caret" aria-hidden="true">&#9662;</span>' +
                '</button>' +
                '<div class="aia-tf-options" data-role="tf-options" role="listbox">' + renderIntervalOptions(preset.interval) + '</div>' +
              '</div>' +
              '<span class="aia-gen-badge" data-role="gen"></span>' +
            '</div>' +
            '<div class="aia-card-actions">' +
              '<span class="aia-verdict" data-role="verdict"></span>' +
              '<button class="aia-run-btn" type="button" data-role="run">Analyze</button>' +
              '<button class="aia-broadcast-btn" type="button" data-role="broadcast" disabled>&#128226; Broadcast</button>' +
              '<span class="aia-chevron" aria-hidden="true">&#9660;</span>' +
            '</div>' +
          '</div>' +
          '<div class="aia-card-content" data-role="content">' +
            '<div class="aia-chart" data-role="chart"></div>' +
            '<div class="aia-body">' +
              '<div class="aia-analysis" data-role="analysis"></div>' +
              '<div class="aia-error" data-role="error" style="display:none"></div>' +
              '<div class="aia-broadcast-status" data-role="broadcast-status" style="display:none"></div>' +
            '</div>' +
            '<div class="aia-meta" data-role="meta"></div>' +
          '</div>' +
        '</div>'
      );
    }

    function refreshBroadcastButton(card, data) {
      var btn = card.querySelector('[data-role="broadcast"]');
      var sent = alreadySent(data);
      btn.disabled = !hasResult(data) || sent;
      btn.innerHTML = sent ? '&#9989; Sent' : '&#128226; Broadcast';
    }

    function updateCard(id) {
      var state = cardState[id];
      var card = document.getElementById(id);
      if (!state || !card) return;
      var data = state.data || {};

      var verdictEl = card.querySelector('[data-role="verdict"]');
      verdictEl.className = verdictClass(data.verdict);
      verdictEl.textContent = data.verdict || 'NO CALL';

      var genEl = card.querySelector('[data-role="gen"]');
      if (data.generatedAt) {
        var bucket = dayBucket(data.generatedAt);
        // Today's generations stay green with the exact time so a fresh call
        // is obvious at a glance; anything older just says which day it was,
        // since the precise time stops mattering once it's not "today".
        genEl.className = 'aia-gen-badge' + (bucket.key === 'today' ? ' generated' : ' stale');
        genEl.textContent = '✓ ' + (bucket.key === 'today' ? formatTime(data.generatedAt) : bucket.label) + ' · ' + state.interval;
      } else {
        genEl.className = 'aia-gen-badge';
        genEl.textContent = 'not generated';
      }

      var chartEl = card.querySelector('[data-role="chart"]');
      chartEl.innerHTML = data.chartUrl
        ? '<img src="' + escapeHtml(data.chartUrl) + '" alt="' + escapeHtml(state.label) + ' chart" loading="lazy" />'
        : '<span class="aia-chart-empty">No chart yet &mdash; click Analyze to generate one.</span>';

      card.querySelector('[data-role="analysis"]').innerHTML = renderAnalysis(data.analysis);

      var metaParts = [];
      if (data.generatedAt) metaParts.push('Generated ' + formatTime(data.generatedAt) + ' · ' + state.interval);
      if (alreadySent(data)) metaParts.push('Broadcast ' + formatTime(data.broadcastAt));
      card.querySelector('[data-role="meta"]').textContent = metaParts.join(' · ');

      refreshBroadcastButton(card, data);

      var statusEl = card.querySelector('[data-role="broadcast-status"]');
      statusEl.style.display = 'none';
      statusEl.textContent = '';

      var errorEl = card.querySelector('[data-role="error"]');
      if (data.error) {
        errorEl.style.display = 'block';
        errorEl.textContent = (data.rateLimited ? '⏳ ' : '') + data.error;
      } else {
        errorEl.style.display = 'none';
        errorEl.textContent = '';
      }
    }

    function setCollapsed(card, id, collapsed, persist) {
      card.classList.toggle('collapsed', collapsed);
      if (!persist) return;
      var list = getCollapsed() || [];
      var i = list.indexOf(id);
      if (collapsed && i === -1) list.push(id);
      if (!collapsed && i > -1) list.splice(i, 1);
      saveCollapsed(list);
    }

    function wireCard(preset, defaultCollapsedIds) {
      var id = cardId(preset.symbol);
      var card = document.getElementById(id);
      if (!card) return;

      setCollapsed(card, id, defaultCollapsedIds.indexOf(id) > -1, false);

      card.querySelector('[data-role="head"]').addEventListener('click', function (e) {
        if (e.target && e.target.getAttribute('data-role') === 'tf') return;
        setCollapsed(card, id, !card.classList.contains('collapsed'), true);
      });

      var tfSelect = card.querySelector('[data-role="tf"]');
      var tfMenu = card.querySelector('[data-role="tf-menu"]');
      var tfLabel = card.querySelector('[data-role="tf-label"]');
      var tfOptions = card.querySelector('[data-role="tf-options"]');
      function closeTfMenu() {
        tfMenu.classList.remove('open');
        card.classList.remove('tf-open');
        tfSelect.setAttribute('aria-expanded', 'false');
      }
      function setTimeframe(value) {
        var state = cardState[id];
        state.interval = value;
        tfLabel.textContent = value;
        tfOptions.querySelectorAll('[data-role="tf-option"]').forEach(function (option) {
          option.classList.toggle('active', option.getAttribute('data-value') === value);
        });
        state.data = null;
        updateCard(id);
        fetch('/api/ai-analysis/peek?symbol=' + encodeURIComponent(state.symbol) + '&interval=' + encodeURIComponent(state.interval))
          .then(function (res) { return res.json(); })
          .then(function (payload) {
            if (state.interval !== value) return; // superseded by another change
            state.data = payload.result || null;
            updateCard(id);
          })
          .catch(function () { /* leave the "not generated" placeholder in place */ });
      }
      tfMenu.addEventListener('click', function (e) { e.stopPropagation(); });
      tfSelect.addEventListener('click', function () {
        var willOpen = !tfMenu.classList.contains('open');
        document.querySelectorAll('.aia-tf-menu.open').forEach(function (menu) {
          menu.classList.remove('open');
          var openCard = menu.closest('.aia-card');
          if (openCard) openCard.classList.remove('tf-open');
          var button = menu.querySelector('[data-role="tf"]');
          if (button) button.setAttribute('aria-expanded', 'false');
        });
        tfMenu.classList.toggle('open', willOpen);
        card.classList.toggle('tf-open', willOpen);
        tfSelect.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
      });
      tfOptions.querySelectorAll('[data-role="tf-option"]').forEach(function (option) {
        option.addEventListener('click', function () {
          closeTfMenu();
          setTimeframe(option.getAttribute('data-value'));
        });
      });

      var runBtn = card.querySelector('[data-role="run"]');
      runBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        var state = cardState[id];
        runBtn.disabled = true;
        runBtn.textContent = 'Analyzing…';
        AdminKey.fetch('/api/ai-analysis/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ symbol: state.symbol, interval: state.interval })
        })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data.configured === false) {
              var errorEl = card.querySelector('[data-role="error"]');
              errorEl.style.display = 'block';
              errorEl.textContent = data.reason || 'AI Analysis is not configured.';
              setCollapsed(card, id, false, true);
              return;
            }
            state.data = data;
            updateCard(id);
            setCollapsed(card, id, false, true);
            loadLog();
          })
          .catch(function (err) {
            var errorEl = card.querySelector('[data-role="error"]');
            errorEl.style.display = 'block';
            errorEl.textContent = 'Request failed: ' + err.message;
            setCollapsed(card, id, false, true);
          })
          .finally(function () {
            runBtn.disabled = false;
            runBtn.textContent = 'Analyze';
          });
      });

      var broadcastBtn = card.querySelector('[data-role="broadcast"]');
      broadcastBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        var state = cardState[id];
        var statusEl = card.querySelector('[data-role="broadcast-status"]');
        var errorEl = card.querySelector('[data-role="error"]');
        broadcastBtn.disabled = true;
        broadcastBtn.textContent = 'Sending…';
        statusEl.style.display = 'none';
        statusEl.textContent = '';
        AdminKey.fetch('/api/ai-analysis/broadcast', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ symbol: state.symbol, interval: state.interval })
        })
          .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
          .then(function (result) {
            var latest = state.data || {};
            if (result.ok && result.data.ok) {
              latest.broadcastAt = result.data.broadcastAt || new Date().toISOString();
              var groupCount = result.data.channelCount;
              statusEl.style.display = 'block';
              statusEl.textContent = '✅ Sent to Telegram (' + groupCount + ' group' + (groupCount === 1 ? '' : 's') + ')';
              var metaEl = card.querySelector('[data-role="meta"]');
              metaEl.textContent = 'Generated ' + formatTime(latest.generatedAt) + ' · ' + state.interval + ' · Broadcast ' + formatTime(latest.broadcastAt);
            } else if (result.data.alreadyBroadcast) {
              latest.broadcastAt = result.data.broadcastAt;
              statusEl.style.display = 'block';
              statusEl.textContent = 'Already sent ' + formatTime(latest.broadcastAt) + ' — generate a new analysis to broadcast again.';
            } else {
              errorEl.style.display = 'block';
              errorEl.textContent = result.data.error || 'Broadcast failed.';
            }
            state.data = latest;
            refreshBroadcastButton(card, latest);
          })
          .catch(function (err) {
            errorEl.style.display = 'block';
            errorEl.textContent = 'Broadcast request failed: ' + err.message;
            refreshBroadcastButton(card, state.data || {});
          });
      });
    }

    document.addEventListener('click', function () {
      document.querySelectorAll('.aia-tf-menu.open').forEach(function (menu) {
        menu.classList.remove('open');
        var openCard = menu.closest('.aia-card');
        if (openCard) openCard.classList.remove('tf-open');
        var button = menu.querySelector('[data-role="tf"]');
        if (button) button.setAttribute('aria-expanded', 'false');
      });
    });

    function renderLogEntry(entry) {
      var bucket = dayBucket(entry.generatedAt);
      var isToday = bucket.key === 'today';
      return (
        '<div class="aia-log-item' + (isToday ? ' aia-log-item--today' : '') + '">' +
          '<span class="' + verdictClass(entry.verdict) + ' aia-log-verdict">' + escapeHtml(entry.verdict || 'NO CALL') + '</span>' +
          '<span class="aia-log-symbol">' + escapeHtml(entry.label || entry.symbol) + '</span>' +
          '<span class="aia-log-tf">' + escapeHtml(entry.interval) + '</span>' +
          '<span class="aia-log-time">' + (isToday ? formatTime(entry.generatedAt) : bucket.label) + '</span>' +
        '</div>'
      );
    }

    function renderLog(entries) {
      if (!entries.length) {
        logRoot.innerHTML = '<div class="aia-chart-empty">No generations yet — click Analyze on a card above.</div>';
        return;
      }
      var order = [];
      var groups = {};
      entries.forEach(function (entry) {
        var bucket = dayBucket(entry.generatedAt);
        if (!groups[bucket.key]) {
          groups[bucket.key] = { label: bucket.label, items: [] };
          order.push(bucket.key);
        }
        groups[bucket.key].items.push(entry);
      });
      logRoot.innerHTML = order.map(function (key) {
        var group = groups[key];
        return (
          '<div class="aia-log-group">' +
            '<div class="aia-log-group-title' + (key === 'today' ? ' aia-log-group-title--today' : '') + '">' + escapeHtml(group.label) + '</div>' +
            group.items.map(renderLogEntry).join('') +
          '</div>'
        );
      }).join('');
    }

    function loadLog() {
      fetch('/api/ai-analysis/log')
        .then(function (res) { return res.json(); })
        .then(function (data) { renderLog(data.entries || []); })
        .catch(function () { logRoot.innerHTML = '<div class="aia-chart-empty">Failed to load the generation log.</div>'; });
    }

    fetch('/api/ai-analysis')
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (!data.configured) {
          notice.style.display = 'block';
          notice.innerHTML = '&#9888;&#65039; AI Analysis is not fully configured on the server. Set <code>OPENAI_API_KEY</code> and <code>CHART_IMG_API_KEY</code> to enable it.';
        }
        availableIntervals = data.availableIntervals || ['4h'];
        var presets = data.presets || [];
        grid.innerHTML = presets.map(renderCard).join('');
        presets.forEach(function (preset) {
          var id = cardId(preset.symbol);
          cardState[id] = { symbol: preset.symbol, label: preset.label, interval: preset.interval, data: preset };
        });
        // First visit: start every card collapsed; afterwards honor whatever
        // the user last left open.
        var allIds = presets.map(function (preset) { return cardId(preset.symbol); });
        var stored = getCollapsed();
        var defaultCollapsedIds = stored === null ? allIds : stored;
        // Persist the first-visit default now, so the first manual toggle
        // edits this baseline instead of starting from an empty list.
        if (stored === null) saveCollapsed(defaultCollapsedIds);
        presets.forEach(function (preset) {
          updateCard(cardId(preset.symbol));
          wireCard(preset, defaultCollapsedIds);
        });
      })
      .catch(function (err) {
        grid.innerHTML = '<div class="aia-notice" style="display:block">Failed to load AI Analysis: ' + err.message + '</div>';
      });

    loadLog();
  })();
</script>
</body>
</html>
