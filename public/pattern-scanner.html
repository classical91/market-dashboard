<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pattern Scanner · Market Command</title>
  <script src="/assets/js/settings.js"></script>
  <link rel="stylesheet" href="/assets/styles/command.css" />
  <link rel="stylesheet" href="/assets/styles/ai-analysis.css" />
  <link rel="stylesheet" href="/assets/styles/pattern-scanner.css" />
</head>
<body>
<div class="app">
  <aside class="cmd-sidebar"></aside>
  <main class="cmd-main">

    <div class="cmd-page-header">
      <div>
        <div class="cmd-page-title">&#128200; Pattern Scanner</div>
        <div class="cmd-page-subtitle">Flags, wedges &amp; RSI divergences over Binance candles (1h / 4h / 1D, top 25 tokens) &mdash; a scanner, not a signal: confirm with breakout, volume, and higher-timeframe trend before acting</div>
      </div>
      <div class="cmd-clock" id="cmd-clock"></div>
    </div>

    <div class="aia-notice" id="ps-notice" style="display:none"></div>

    <div class="ps-toolbar">
      <button class="aia-run-btn" type="button" id="ps-refresh-btn">Rescan</button>
      <button class="aia-run-btn" type="button" id="ps-toggle-all-btn">Expand All</button>
      <a class="aia-run-btn ps-trades-link" href="/pattern-scanner-trades.html">&#9733; My Trades</a>
      <span class="ps-updated" id="ps-updated"></span>
    </div>

    <div class="ps-grid" id="ps-grid"></div>

    <footer>Pattern Scanner &mdash; <a href="/pattern-scanner-trades.html">My Trades</a> &mdash; <a href="/ai-analysis.html">AI Analysis</a> &mdash; <a href="/layout-analysis.html">My Layouts</a> &mdash; <a href="/">Overview</a></footer>

  </main>
</div>
<script src="/assets/js/sidebar.js"></script>
<script src="/assets/js/admin-key.js"></script>
<script src="/assets/js/pattern-render.js"></script>
<script>
  (function () {
    function tick() {
      var el = document.getElementById('cmd-clock');
      if (el) el.textContent = new Date().toLocaleString(undefined, {
        weekday: 'short', hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }
    tick(); setInterval(tick, 1000);

    var grid = document.getElementById('ps-grid');
    var notice = document.getElementById('ps-notice');
    var updatedEl = document.getElementById('ps-updated');
    var refreshBtn = document.getElementById('ps-refresh-btn');
    var toggleAllBtn = document.getElementById('ps-toggle-all-btn');
    // Cards start collapsed (header + bias only) so a full scan reads as a
    // scannable list; expanding one (or all) reveals the chart + metrics.
    var allExpanded = false;
    var trackedKeys = {}; // "symbol:interval" -> true, refreshed from /api/watchlist
    var lastResults = [];

    var escapeHtml = PatternRender.escapeHtml;
    var renderCard = PatternRender.renderCard;
    var drawChart = PatternRender.drawChart;

    function trackKey(symbol, interval) { return symbol + ':' + interval; }

    function loadWatchlist() {
      return fetch('/api/watchlist')
        .then(function (res) { return res.json(); })
        .then(function (data) {
          trackedKeys = {};
          (data.items || []).forEach(function (item) { trackedKeys[trackKey(item.symbol, item.interval)] = true; });
        })
        .catch(function () { /* leave whatever tracked state we already had */ });
    }

    // 25 tokens x 3 timeframes is 75 combos — show only the hits (pattern or
    // divergence) plus any failed scans, not 70 "nothing here" cards.
    function render(results) {
      lastResults = results;
      var hits = results.filter(function (r) { return r.pattern || r.divergence; });
      var errors = results.filter(function (r) { return r.error; });
      hits.sort(function (a, b) {
        var scoreA = (a.pattern && a.pattern.score) || 0;
        var scoreB = (b.pattern && b.pattern.score) || 0;
        return scoreB - scoreA;
      });
      var scannedNote = '<div class="ps-empty">Scanned ' + results.length + ' token/timeframe combos &mdash; ' + hits.length + ' with a pattern or divergence.</div>';
      grid.innerHTML = scannedNote +
        hits.map(function (entry, i) {
          return renderCard(entry, i, { collapsed: !allExpanded, tracked: !!trackedKeys[trackKey(entry.symbol, entry.interval)] });
        }).join('') +
        errors.map(function (entry) { return renderCard(entry, -1, {}); }).join('');
      grid.querySelectorAll('canvas[data-chart-index]').forEach(function (canvas) {
        var entry = hits[Number(canvas.getAttribute('data-chart-index'))];
        if (entry && entry.chart) drawChart(canvas, entry.chart);
      });
    }

    function toggleTrack(btn) {
      var symbol = btn.getAttribute('data-symbol');
      var interval = btn.getAttribute('data-interval');
      var label = btn.getAttribute('data-label');
      var key = trackKey(symbol, interval);
      var isTracked = !!trackedKeys[key];
      btn.disabled = true;
      AdminKey.fetch('/api/watchlist', {
        method: isTracked ? 'DELETE' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ symbol: symbol, interval: interval, label: label })
      })
        .then(function (res) { return res.json(); })
        .then(function () {
          if (isTracked) delete trackedKeys[key];
          else trackedKeys[key] = true;
          render(lastResults);
        })
        .catch(function () { /* leave the star as-is; user can retry */ })
        .finally(function () { btn.disabled = false; });
    }

    function load(force) {
      refreshBtn.disabled = true;
      refreshBtn.textContent = 'Scanning…';
      Promise.all([loadWatchlist(), fetch('/api/pattern-scanner' + (force ? '?force=true' : '')).then(function (res) { return res.json(); })])
        .then(function (results) {
          render(results[1].results || []);
          updatedEl.textContent = 'Updated ' + new Date().toLocaleTimeString();
        })
        .catch(function (err) {
          notice.style.display = 'block';
          notice.innerHTML = '&#9888;&#65039; Failed to load pattern scan: ' + escapeHtml(err.message);
        })
        .finally(function () {
          refreshBtn.disabled = false;
          refreshBtn.textContent = 'Rescan';
        });
    }

    // Delegated so it keeps working across every re-render (grid.innerHTML
    // is replaced wholesale on each scan) without re-binding per card.
    grid.addEventListener('click', function (e) {
      if (e.target.closest('[data-role="ticker-link"], .ps-ticker-link')) return;
      var trackBtn = e.target.closest('[data-role="track-btn"]');
      if (trackBtn) { toggleTrack(trackBtn); return; }
      var head = e.target.closest('[data-role="head"]');
      if (!head) return;
      head.closest('.ps-card').classList.toggle('collapsed');
    });

    toggleAllBtn.addEventListener('click', function () {
      allExpanded = !allExpanded;
      toggleAllBtn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
      grid.querySelectorAll('.ps-card').forEach(function (card) {
        card.classList.toggle('collapsed', !allExpanded);
      });
    });

    refreshBtn.addEventListener('click', function () { load(true); });
    load(false);
  })();
</script>
</body>
</html>
