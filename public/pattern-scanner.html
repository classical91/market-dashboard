<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pattern Scanner · Market Command</title>
  <script src="/assets/js/settings.js"></script>
  <link rel="stylesheet" href="/assets/styles/command.css" />
  <link rel="stylesheet" href="/assets/styles/ai-analysis.css" />
  <link rel="stylesheet" href="/assets/styles/pattern-scanner.css" />
</head>
<body>
<div class="app">
  <aside class="cmd-sidebar"></aside>
  <main class="cmd-main">

    <div class="cmd-page-header">
      <div>
        <div class="cmd-page-title">&#128200; Pattern Scanner</div>
        <div class="cmd-page-subtitle">Flags, wedges &amp; RSI divergences over Binance candles (1h / 4h / 1D, top 25 tokens) &mdash; a scanner, not a signal: confirm with breakout, volume, and higher-timeframe trend before acting</div>
      </div>
      <div class="cmd-clock" id="cmd-clock"></div>
    </div>

    <div class="aia-notice" id="ps-notice" style="display:none"></div>

    <div class="ps-toolbar">
      <button class="aia-run-btn" type="button" id="ps-refresh-btn">Rescan</button>
      <span class="ps-updated" id="ps-updated"></span>
    </div>

    <div class="ps-grid" id="ps-grid"></div>

    <footer>Pattern Scanner &mdash; <a href="/ai-analysis.html">AI Analysis</a> &mdash; <a href="/layout-analysis.html">My Layouts</a> &mdash; <a href="/">Overview</a></footer>

  </main>
</div>
<script src="/assets/js/sidebar.js"></script>
<script>
  (function () {
    function tick() {
      var el = document.getElementById('cmd-clock');
      if (el) el.textContent = new Date().toLocaleString(undefined, {
        weekday: 'short', hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }
    tick(); setInterval(tick, 1000);

    var grid = document.getElementById('ps-grid');
    var notice = document.getElementById('ps-notice');
    var updatedEl = document.getElementById('ps-updated');
    var refreshBtn = document.getElementById('ps-refresh-btn');

    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, function (ch) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch];
      });
    }

    function biasClass(bias) {
      if (bias === 'bullish') return 'ps-bias ps-bias--bullish';
      if (bias === 'bearish') return 'ps-bias ps-bias--bearish';
      return 'ps-bias';
    }

    var TV_INTERVALS = { '1h': '60', '4h': '240', '1D': 'D' };

    function tvChartUrl(symbol, interval) {
      return 'https://www.tradingview.com/chart/?symbol=' + encodeURIComponent('BINANCE:' + symbol) +
        '&interval=' + encodeURIComponent(TV_INTERVALS[interval] || '240');
    }

    function tickerLink(entry) {
      return '<a class="ps-ticker-link" href="' + tvChartUrl(entry.symbol, entry.interval) + '" target="_blank" rel="noopener" title="Open ' +
        escapeHtml(entry.symbol) + ' ' + escapeHtml(entry.interval) + ' on TradingView">' + escapeHtml(entry.label) + ' <span class="ps-ticker-arrow">&#8599;</span></a>';
    }

    function patternBlock(pattern) {
      if (!pattern) return '';
      return (
        '<div class="ps-pattern-name">' + escapeHtml(pattern.pattern) + '</div>' +
        '<div class="ps-status ps-status--' + escapeHtml(pattern.status) + '">' + (pattern.status === 'breakout' ? '&#9889; Breakout' : '&#8987; Forming') + '</div>' +
        '<div class="ps-metrics">' +
          '<div class="ps-metric"><span>Score</span><b>' + pattern.score + '</b></div>' +
          '<div class="ps-metric"><span>Width ratio</span><b>' + pattern.widthRatio + '</b></div>' +
          '<div class="ps-metric"><span>Impulse</span><b>' + pattern.impulseReturnPct + '%</b></div>' +
          '<div class="ps-metric"><span>Vol ratio</span><b>' + pattern.volumeRatio + '</b></div>' +
        '</div>'
      );
    }

    function divergenceBlock(div) {
      if (!div) return '';
      return (
        '<div class="ps-divergence">' +
          '<div class="ps-pattern-name">' + escapeHtml(div.type) + ' Divergence</div>' +
          '<div class="ps-metrics">' +
            '<div class="ps-metric"><span>Indicator</span><b>' + escapeHtml(div.indicator) + '</b></div>' +
            '<div class="ps-metric"><span>Price &Delta;</span><b>' + div.priceDeltaPct + '%</b></div>' +
            '<div class="ps-metric"><span>RSI &Delta;</span><b>' + div.rsiDelta + '</b></div>' +
            '<div class="ps-metric"><span>Bars ago</span><b>' + div.barsAgo + '</b></div>' +
          '</div>' +
        '</div>'
      );
    }

    function renderCard(entry, index) {
      if (entry.error) {
        return (
          '<div class="ps-card ps-card--empty">' +
            '<div class="ps-card-symbol">' + escapeHtml(entry.label) + '<span class="ps-tf">' + escapeHtml(entry.interval) + '</span></div>' +
            '<div class="ps-empty">Scan failed: ' + escapeHtml(entry.error) + '</div>' +
          '</div>'
        );
      }
      var bias = (entry.pattern && entry.pattern.bias) || (entry.divergence && entry.divergence.bias) || '';
      var chartHtml = entry.chart ? '<canvas class="ps-chart" data-chart-index="' + index + '" width="640" height="280"></canvas>' : '';
      return (
        '<div class="ps-card">' +
          '<div class="ps-card-head">' +
            '<div class="ps-card-symbol">' + tickerLink(entry) + '<span class="ps-tf">' + escapeHtml(entry.interval) + '</span></div>' +
            '<span class="' + biasClass(bias) + '">' + escapeHtml(bias) + '</span>' +
          '</div>' +
          chartHtml +
          patternBlock(entry.pattern) +
          divergenceBlock(entry.divergence) +
        '</div>'
      );
    }

    // Minimal candlestick renderer with pattern trendlines and a dashed
    // divergence connector — geometry comes precomputed from the server.
    function drawChart(canvas, chart) {
      var ctx = canvas.getContext('2d');
      var W = canvas.width;
      var H = canvas.height;
      var pad = { top: 10, right: 8, bottom: 8, left: 8 };
      var candles = chart.candles;
      var n = candles.length;
      if (!n) return;

      var min = Infinity;
      var max = -Infinity;
      candles.forEach(function (c) {
        if (c[3] < min) min = c[3];
        if (c[2] > max) max = c[2];
      });
      if (chart.pattern) {
        [chart.pattern.upper.y0, chart.pattern.upper.y1, chart.pattern.lower.y0, chart.pattern.lower.y1].forEach(function (y) {
          if (y < min) min = y;
          if (y > max) max = y;
        });
      }
      var span = max - min || 1;

      function x(i) { return pad.left + (i / Math.max(1, n - 1)) * (W - pad.left - pad.right); }
      function y(price) { return pad.top + (1 - (price - min) / span) * (H - pad.top - pad.bottom); }

      ctx.clearRect(0, 0, W, H);

      var bodyW = Math.max(2, ((W - pad.left - pad.right) / n) * 0.6);
      candles.forEach(function (c, i) {
        var open = c[1], high = c[2], low = c[3], close = c[4];
        var up = close >= open;
        ctx.strokeStyle = up ? '#26a69a' : '#ef5350';
        ctx.fillStyle = up ? '#26a69a' : '#ef5350';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x(i), y(high));
        ctx.lineTo(x(i), y(low));
        ctx.stroke();
        var top = y(Math.max(open, close));
        var bottom = y(Math.min(open, close));
        ctx.fillRect(x(i) - bodyW / 2, top, bodyW, Math.max(1, bottom - top));
      });

      if (chart.pattern) {
        ctx.strokeStyle = '#4da3ff';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(x(chart.pattern.x0), y(chart.pattern.upper.y0));
        ctx.lineTo(x(chart.pattern.x1), y(chart.pattern.upper.y1));
        ctx.moveTo(x(chart.pattern.x0), y(chart.pattern.lower.y0));
        ctx.lineTo(x(chart.pattern.x1), y(chart.pattern.lower.y1));
        ctx.stroke();
      }

      if (chart.divergence) {
        var p = chart.divergence.pivots;
        ctx.strokeStyle = '#f5c542';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([5, 4]);
        ctx.beginPath();
        ctx.moveTo(x(p[0].x), y(p[0].price));
        ctx.lineTo(x(p[1].x), y(p[1].price));
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#f5c542';
        p.forEach(function (pt) {
          ctx.beginPath();
          ctx.arc(x(pt.x), y(pt.price), 3.5, 0, Math.PI * 2);
          ctx.fill();
        });
      }
    }

    // 25 tokens x 3 timeframes is 75 combos — show only the hits (pattern or
    // divergence) plus any failed scans, not 70 "nothing here" cards.
    function render(results) {
      var hits = results.filter(function (r) { return r.pattern || r.divergence; });
      var errors = results.filter(function (r) { return r.error; });
      hits.sort(function (a, b) {
        var scoreA = (a.pattern && a.pattern.score) || 0;
        var scoreB = (b.pattern && b.pattern.score) || 0;
        return scoreB - scoreA;
      });
      var scannedNote = '<div class="ps-empty">Scanned ' + results.length + ' token/timeframe combos &mdash; ' + hits.length + ' with a pattern or divergence.</div>';
      grid.innerHTML = scannedNote +
        hits.map(function (entry, i) { return renderCard(entry, i); }).join('') +
        errors.map(function (entry) { return renderCard(entry, -1); }).join('');
      grid.querySelectorAll('canvas[data-chart-index]').forEach(function (canvas) {
        var entry = hits[Number(canvas.getAttribute('data-chart-index'))];
        if (entry && entry.chart) drawChart(canvas, entry.chart);
      });
    }

    function load(force) {
      refreshBtn.disabled = true;
      refreshBtn.textContent = 'Scanning…';
      fetch('/api/pattern-scanner' + (force ? '?force=true' : ''))
        .then(function (res) { return res.json(); })
        .then(function (data) {
          render(data.results || []);
          updatedEl.textContent = 'Updated ' + new Date().toLocaleTimeString();
        })
        .catch(function (err) {
          notice.style.display = 'block';
          notice.innerHTML = '&#9888;&#65039; Failed to load pattern scan: ' + escapeHtml(err.message);
        })
        .finally(function () {
          refreshBtn.disabled = false;
          refreshBtn.textContent = 'Rescan';
        });
    }

    refreshBtn.addEventListener('click', function () { load(true); });
    load(false);
  })();
</script>
</body>
</html>
