<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Intel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #f0ede8;
      --muted: #888;
      --dim: #555;
      --amber: #EF9F27;
      --amber-bg: rgba(239,159,39,0.12);
      --teal: #1D9E75;
      --teal-bg: rgba(29,158,117,0.12);
      --blue: #378ADD;
      --blue-bg: rgba(55,138,221,0.12);
      --coral: #D85A30;
      --coral-bg: rgba(216,90,48,0.12);
    }

    body {
      font-family: -apple-system, 'SF Pro Text', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.5rem;
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 14px;
      border-bottom: 0.5px solid var(--border);
    }
    .logo {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
    }
    .ts {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: var(--dim);
    }

    .section-label {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 10px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 10px;
      margin-bottom: 2rem;
    }
    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      text-decoration: none;
      display: block;
      transition: border-color 0.15s, background 0.15s;
    }
    .card:hover { border-color: var(--border-hover); background: var(--surface2); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .badge {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 5px;
      letter-spacing: 0.06em;
    }
    .arrow { color: var(--dim); font-size: 14px; }
    .card-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
    .card-src { font-size: 11px; font-family: 'SF Mono', 'Fira Code', monospace; color: var(--dim); }

    footer {
      font-size: 11px;
      color: var(--dim);
      font-family: 'SF Mono', 'Fira Code', monospace;
      text-align: center;
      padding-top: 1rem;
      border-top: 0.5px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <span class="logo">Market Intel</span>
  <span class="ts" id="ts"></span>
</header>

<div class="section-label">Quick Launch</div>
<div class="cards">
  <a class="card" href="https://companiesmarketcap.com/" target="_blank">
    <div class="card-top">
      <span class="badge" style="background:var(--amber-bg);color:var(--amber)">MARKET CAP</span>
      <span class="arrow">↗</span>
    </div>
    <div class="card-title">Assets Ranked by Market Cap</div>
    <div class="card-src">companiesmarketcap.com</div>
  </a>
  <a class="card" href="https://www.marketwatch.com/economy-politics/calendar" target="_blank">
    <div class="card-top">
      <span class="badge" style="background:var(--teal-bg);color:var(--teal)">ECON CALENDAR</span>
      <span class="arrow">↗</span>
    </div>
    <div class="card-title">U.S. Economic Calendar</div>
    <div class="card-src">marketwatch.com</div>
  </a>
  <a class="card" href="https://www.marketwatch.com/tools/options-expiration-calendar" target="_blank">
    <div class="card-top">
      <span class="badge" style="background:var(--coral-bg);color:var(--coral)">OPTIONS EXP</span>
      <span class="arrow">↗</span>
    </div>
    <div class="card-title">Options Expiration Calendar</div>
    <div class="card-src">marketwatch.com</div>
  </a>
  <a class="card" href="https://www.cnbc.com/bonds/" target="_blank">
    <div class="card-top">
      <span class="badge" style="background:var(--blue-bg);color:var(--blue)">BONDS &amp; RATES</span>
      <span class="arrow">↗</span>
    </div>
    <div class="card-title">Bonds &amp; Rates</div>
    <div class="card-src">marketwatch.com</div>
  </a>
</div>

<footer>Market Intel</footer>

<script>
  function setTimestamp() {
    const now = new Date();
    document.getElementById('ts').textContent =
      now.toLocaleDateString('en-CA', { weekday:'short', month:'short', day:'numeric' }) +
      ' · ' + now.toLocaleTimeString('en-CA', { hour:'2-digit', minute:'2-digit' });
  }
  setTimestamp();
  setInterval(setTimestamp, 60000);
</script>
</body>
</html>
