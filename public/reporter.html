<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Reporter · Market Command</title>
  <script src="/assets/js/settings.js"></script>
  <link rel="stylesheet" href="/assets/styles/command.css" />
  <style>
    /* ── Reporter-specific styles ─────────────────────────── */
    .reporter-header-row {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 18px; flex-wrap: wrap;
    }
    .reporter-date-badge {
      font-size: 12px; font-weight: 700; letter-spacing: 0.07em;
      color: var(--blue);
      background: var(--blue-bg);
      border: 1px solid rgba(77,163,255,0.22);
      padding: 6px 14px; border-radius: 10px;
    }
    .reporter-gen-badge {
      font-size: 11px; color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      padding: 5px 12px; border-radius: 10px;
    }
    .reporter-actions {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .reporter-log {
      display: none;
      margin: 18px 0 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.012)),
        var(--surface);
      border: 1px solid var(--border);
      border-radius: 15px;
      padding: 14px 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .reporter-log-title {
      color: var(--soft);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.07em;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .reporter-log-list {
      display: grid;
      gap: 14px;
    }
    .reporter-log-group {
      display: grid;
      gap: 8px;
    }
    .reporter-log-group-title {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .reporter-log-item {
      appearance: none;
      width: 100%;
      background: transparent;
      border: 0;
      color: inherit;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 8px 0 0;
      text-align: left;
      font: inherit;
      border-top: 1px solid var(--border);
      transition: color 0.15s, background 0.15s;
    }
    .reporter-log-item:first-child {
      border-top: 0;
      padding-top: 0;
    }
    .reporter-log-item:hover {
      color: var(--soft);
    }
    .reporter-log-item.past {
      opacity: 0.62;
      filter: grayscale(0.4);
    }
    .reporter-log-item.past .reporter-log-label,
    .reporter-log-item.past .reporter-log-time,
    .reporter-log-item.past .reporter-log-read {
      color: var(--muted);
    }
    .reporter-log-item.past .reporter-log-status {
      color: var(--dim);
    }
    .reporter-log-item.past:hover {
      opacity: 0.82;
      filter: grayscale(0.2);
    }
    .reporter-log-item[aria-disabled="true"] {
      cursor: default;
    }
    .reporter-log-item.crypto .reporter-log-label { color: var(--purple); }
    .reporter-log-item.economics .reporter-log-label { color: var(--blue); }
    .reporter-log-item.markets .reporter-log-label { color: var(--teal); }
    .reporter-log-name {
      display: grid;
      gap: 2px;
      min-width: 0;
    }
    .reporter-log-label {
      color: var(--text);
      font-weight: 700;
    }
    .reporter-log-status {
      color: var(--muted);
      font-size: 11px;
    }
    .reporter-log-time {
      color: var(--muted);
      flex: 0 0 auto;
      text-align: right;
    }
    .reporter-log-read {
      color: var(--blue);
      display: block;
      font-size: 11px;
      margin-top: 2px;
    }
    .reporter-log-empty {
      color: var(--dim);
      font-size: 12px;
      padding: 2px 0 0;
    }

    /* ── Tabs ─────────────────────────────────────────────── */
    .reporter-tabs {
      display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .reporter-tab {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      padding: 10px 20px; border-radius: 14px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: 0.18s;
      font-family: inherit; white-space: nowrap;
    }
    .reporter-tab.active {
      background: rgba(77,163,255,0.16);
      color: var(--text);
      border-color: rgba(77,163,255,0.36);
    }
    .reporter-tab:hover:not(.active) {
      background: rgba(255,255,255,0.08);
      color: var(--soft);
      border-color: var(--border-hover);
    }
    .reporter-link-row {
      display: none;
      gap: 10px;
      flex-wrap: wrap;
      margin: -6px 0 20px;
    }
    .reporter-link-row a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--soft);
      text-decoration: none;
      padding: 9px 14px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
    }
    .reporter-link-row a:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border-color: var(--border-hover);
    }
    /* ── Loading / Error ──────────────────────────────────── */
    .reporter-loading {
      text-align: center; padding: 56px 20px;
      color: var(--muted); font-size: 14px;
    }
    .spinner {
      display: block; width: 28px; height: 28px;
      margin: 0 auto 16px;
      border: 3px solid rgba(77,163,255,0.18);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .reporter-error {
      background: rgba(255,77,109,0.07);
      border: 1px solid rgba(255,77,109,0.2);
      border-radius: 14px; padding: 18px 20px;
      color: #ff8fa0; font-size: 13.5px; line-height: 1.6;
    }
    .reporter-error code {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px; border-radius: 5px;
      font-size: 12px;
    }
    .reporter-unconfigured {
      background: rgba(77,163,255,0.06);
      border: 1px solid rgba(77,163,255,0.2);
      border-radius: 14px; padding: 24px 22px;
      font-size: 14px; line-height: 1.65; color: var(--soft);
    }
    .reporter-unconfigured strong { color: var(--text); }
    .reporter-unconfigured code {
      background: rgba(255,255,255,0.08);
      padding: 2px 7px; border-radius: 5px;
      font-size: 12.5px; color: var(--blue);
    }

    /* ── Story cards ──────────────────────────────────────── */
    .stories { display: grid; gap: 10px; }

    .story {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015)),
        var(--surface);
      border: 1px solid var(--border);
      border-radius: 15px; padding: 15px 18px;
      transition: border-color 0.15s;
    }
    .story:hover { border-color: rgba(77,163,255,0.28); }

    /* One accent color per report category, applied only to reports saved today. */
    .story--crypto {
      background: linear-gradient(180deg, var(--purple-bg), rgba(155,123,255,0.03)), var(--surface);
      border-color: rgba(155,123,255,0.3);
    }
    .story--economics {
      background: linear-gradient(180deg, var(--blue-bg), rgba(77,163,255,0.03)), var(--surface);
      border-color: rgba(77,163,255,0.3);
    }
    .story--markets {
      background: linear-gradient(180deg, var(--teal-bg), rgba(0,227,150,0.03)), var(--surface);
      border-color: rgba(0,227,150,0.3);
    }

    .story p {
      color: var(--text); font-size: 14px;
      line-height: 1.5; margin-bottom: 6px;
    }
    .story p:last-child { margin-bottom: 0; }

    .story ul {
      list-style: none; padding: 0; margin: 4px 0 0;
    }
    .story li {
      color: var(--soft); font-size: 13px; line-height: 1.55;
      padding-left: 16px; position: relative; margin-bottom: 3px;
    }
    .story li:last-child { margin-bottom: 0; }
    .story li::before {
      content: "–"; position: absolute; left: 0; color: var(--muted);
    }
    .story strong { color: var(--text); }
  </style>
</head>
<body>
<div class="app">
  <aside class="cmd-sidebar"></aside>
  <main class="cmd-main">

    <div class="cmd-page-header">
      <div>
        <div class="cmd-page-title" id="reporterPageTitle">📰 Daily News Reporter</div>
        <div class="cmd-page-subtitle" id="reporterPageSubtitle">AI-generated briefing &middot; generated on demand</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="cmd-clock" id="cmd-clock"></div>
      </div>
    </div>

    <!-- Date + generated-at badges -->
    <div class="reporter-header-row" id="reporterHeaderRow" style="display:none">
      <div class="reporter-date-badge" id="reporterDate"></div>
      <div class="reporter-gen-badge" id="reporterGen"></div>
      <button class="open-all-btn reporter-generate-cta" id="reporterRegenBtn" type="button" style="margin-left:auto">&#9889; Regenerate</button>
    </div>

    <!-- Tabs -->
    <div class="reporter-tabs" id="reporterTabs">
      <button class="reporter-tab active" data-tab="crypto">₿ Crypto Top 10</button>
      <button class="reporter-tab" data-tab="economics">🌍 Economics Top 10</button>
      <button class="reporter-tab" data-tab="markets">📊 Markets Top 10</button>
    </div>

    <div class="reporter-link-row" id="reporterExternalLinks"></div>

    <!-- Content area -->
    <div id="reporterContent">
      <div class="reporter-loading">
        <span class="spinner"></span>
        Loading daily briefing&hellip;
      </div>
    </div>

    <section class="reporter-log" id="reporterLog" aria-label="Saved generation log"></section>

    <footer>Market Command &mdash; AI-generated content based on model knowledge</footer>

  </main>
</div>

<script src="/assets/js/sidebar.js"></script>
<script src="/assets/js/admin-key.js"></script>
<script>
  /* ── Clock ──────────────────────────────────────────────── */
  (function () {
    function tick() {
      var el = document.getElementById('cmd-clock');
      if (el) el.textContent = new Date().toLocaleString(undefined, {
        weekday: 'short', hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }
    tick();
    setInterval(tick, 1000);
  })();

  /* ── Reporter ───────────────────────────────────────────── */
  (function () {
    var pageSections = {
      '/emerging-markets.html': 'crypto',
      '/economics-top-10.html': 'economics',
      '/markets-top-10.html': 'markets'
    };
    var sectionPages = {
      crypto: '/emerging-markets.html',
      economics: '/economics-top-10.html',
      markets: '/markets-top-10.html'
    };
    var fixedSection = pageSections[window.location.pathname] || '';
    var activeTab = fixedSection || 'crypto';
    var reportData = null;
    var generationLogEntries = [];
    var localLogKey = 'reporterGenerationLog:v1';
    var localLogSynced = false;
    var tabLabels = {
      crypto: 'Emerging Markets',
      economics: 'Economics Top 10',
      markets: 'Markets Top 10'
    };
    var pageTitles = {
      crypto: '🚀 Emerging Markets',
      economics: '🌍 Economics Top 10',
      markets: '📊 Markets Top 10'
    };
    var pageSubtitles = {
      crypto: 'Trending tokens briefing · generated on demand',
      economics: 'Global economics briefing · generated on demand',
      markets: 'Global markets briefing · generated on demand'
    };

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function applyBold(text) {
      return esc(text).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    function parseToStories(text, sectionClass) {
      /* Split on blank lines → individual story cards */
      var blocks = text.split(/\n{2,}/);
      var cardClass = 'story' + (sectionClass ? ' story--' + sectionClass : '');
      return blocks
        .map(function (b) { return b.trim(); })
        .filter(Boolean)
        .map(function (block) {
          var lines = block.split('\n');
          var html = '';
          var inList = false;

          lines.forEach(function (line) {
            var t = line.trim();
            if (!t) return;
            if (t.startsWith('- ')) {
              if (!inList) { html += '<ul>'; inList = true; }
              html += '<li>' + applyBold(t.slice(2)) + '</li>';
            } else {
              if (inList) { html += '</ul>'; inList = false; }
              html += '<p>' + applyBold(t) + '</p>';
            }
          });

          if (inList) html += '</ul>';
          return '<div class="' + cardClass + '">' + html + '</div>';
        })
        .join('');
    }

    function isDateToday(value) {
      if (!value) return false;
      var ts = new Date(value);
      if (Number.isNaN(ts.getTime())) return false;
      return dateKey(ts) === dateKey();
    }

    function generateCta(label) {
      return '<div style="margin-top:14px">' +
        '<button class="open-all-btn reporter-generate-cta" type="button" style="margin:0">⚡ ' +
        esc(label || 'Generate Current Page') + '</button></div>';
    }

    function renderTab(tab) {
      var content = document.getElementById('reporterContent');
      if (!reportData) {
        content.innerHTML = '<div class="reporter-unconfigured">' +
          '<strong>' + esc(tabLabels[tab] || 'Reporter') + ' is selected</strong><br>' +
          'No saved report is loaded for this page yet.' + generateCta() + '</div>';
        return;
      }
      var text = reportData[tab];
      if (!text) {
        content.innerHTML = '<div class="reporter-unconfigured">' +
          '<strong>' + esc(tabLabels[tab] || 'Reporter') + ' is selected</strong><br>' +
          'No saved report exists for this page yet.' + generateCta() + '</div>';
        return;
      }
      var generatedAt = reportData.generatedAtBySection && reportData.generatedAtBySection[tab];
      var sectionClass = isDateToday(generatedAt) ? tab : '';
      content.innerHTML = '<div class="stories">' + parseToStories(text, sectionClass) + '</div>';
    }

    function currentTtl() {
      return window.AppSettings ? window.AppSettings.getFrequency() : 24;
    }

    function currentPromptOverride(section) {
      if (!window.AppSettings || !window.AppSettings.getReporterPromptOverride) return '';
      return window.AppSettings.getReporterPromptOverride(section);
    }

    function configurePageShell() {
      if (!fixedSection) return;
      document.title = tabLabels[fixedSection] + ' · Market Command';
      var title = document.getElementById('reporterPageTitle');
      var subtitle = document.getElementById('reporterPageSubtitle');
      if (title) title.textContent = pageTitles[fixedSection] || 'Daily News Reporter';
      if (subtitle) subtitle.textContent = pageSubtitles[fixedSection] || 'AI-generated briefing · generated on demand';
      var links = document.getElementById('reporterExternalLinks');
      if (!links) return;
      if (fixedSection === 'crypto') {
        links.style.display = 'flex';
        links.innerHTML =
          '<a href="https://coinmarketcap.com/trending-cryptocurrencies/" target="_blank" rel="noopener">CoinMarketCap Trending ↗</a>' +
          '<a href="https://cryptobubbles.net/en" target="_blank" rel="noopener">CryptoBubbles ↗</a>';
      } else {
        links.style.display = 'none';
        links.innerHTML = '';
      }
    }

    function isRateLimitMessage(message) {
      return /rate limit|rate-limited|429/i.test(String(message || ''));
    }

    function readApiJson(res) {
      if (res.ok) return res.json();
      return res.json().catch(function () {
        return {};
      }).then(function (body) {
        var message = body.error || ('HTTP ' + res.status);
        if (res.status === 429 || isRateLimitMessage(message)) {
          message = 'OpenAI rate limit hit. Wait a few minutes, then generate this page again.';
        }
        var err = new Error(message);
        err.status = isRateLimitMessage(message) ? 429 : res.status;
        throw err;
      });
    }

    function showUnconfigured() {
      document.getElementById('reporterContent').innerHTML =
        '<div class="reporter-unconfigured">' +
        '<strong>Setup required</strong><br>' +
        'Set the <code>OPENAI_API_KEY</code> environment variable on Railway ' +
        'to enable the Daily News Reporter. The reporter uses GPT-5.5 to generate ' +
        'structured briefings on crypto, economics, and global markets.</div>';
    }

    function showEmptyState() {
      var headerRow = document.getElementById('reporterHeaderRow');
      if (headerRow) headerRow.style.display = 'none';
      document.getElementById('reporterContent').innerHTML =
        '<div class="reporter-unconfigured">' +
        '<strong>No briefing generated yet</strong><br>' +
        'Generate today\'s crypto, economics, and markets briefings. Reports are only ' +
        'generated when you ask &mdash; opening this page no longer triggers a generation.' +
        generateCta() + '</div>';
    }

    function showRateLimited(data) {
      var until = data && data.rateLimitedUntil ? new Date(data.rateLimitedUntil) : null;
      var untilText = until ? until.toLocaleTimeString(undefined, {
        hour: '2-digit', minute: '2-digit'
      }) : 'a few minutes';
      var modelText = data && data.reporterModel ? ' Model: ' + esc(data.reporterModel) + '.' : '';
      if (data && hasContent(data)) {
        applyReport(data);
        document.getElementById('reporterContent').insertAdjacentHTML(
          'afterbegin',
          '<div class="reporter-error" style="margin-bottom:12px">OpenAI is rate-limited. Showing the saved report. Try generating again after ' +
          esc(untilText) + '.' + modelText + '</div>'
        );
        return;
      }
      document.getElementById('reporterContent').innerHTML =
        '<div class="reporter-unconfigured">' +
        '<strong>OpenAI is rate-limited</strong><br>' +
        'No new report was generated. Try <strong>Generate Current Page</strong> again after ' +
        esc(untilText) + '.' + modelText + '</div>';
    }

    function showAlreadyGenerated(data) {
      applyReport(data);
      var label = tabLabels[data && data.generatedSection] || tabLabels[activeTab] || 'Reporter';
      var next = data && data.nextGenerationDate ? ' New generation unlocks on ' + esc(data.nextGenerationDate) + '.' : '';
      document.getElementById('reporterContent').insertAdjacentHTML(
        'afterbegin',
        '<div class="reporter-unconfigured" style="margin-bottom:12px">' +
        '<strong>' + esc(label) + ' already generated today</strong><br>' +
        'Showing the saved report. No new OpenAI API call was made.' + next +
        '</div>'
      );
    }

    function hasContent(data) {
      return !!(data && (data.crypto || data.economics || data.markets));
    }

    function readLocalLog() {
      try {
        var parsed = JSON.parse(localStorage.getItem(localLogKey) || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch (err) {
        return [];
      }
    }

    function writeLocalLog(entries) {
      try {
        localStorage.setItem(localLogKey, JSON.stringify(entries.slice(0, 100)));
      } catch (err) {}
    }

    function logEntryKey(entry) {
      return [entry.section || '', entry.generatedAt || '', entry.label || ''].join('|');
    }

    function dateKey(date) {
      var d = date || new Date();
      var month = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + month + '-' + day;
    }

    function isCurrentLogEntry(entry) {
      if (!entry) return false;
      if (entry.generatedAt) {
        var ts = new Date(entry.generatedAt);
        if (!Number.isNaN(ts.getTime()) && dateKey(ts) === dateKey()) return true;
      }
      if (entry.generatedDateKey === dateKey()) return true;
      if (entry.dateStr) {
        var todayLabel = new Date().toLocaleDateString('en-US', {
          weekday: 'long',
          month: 'long',
          day: 'numeric',
          year: 'numeric'
        }).toUpperCase();
        return String(entry.dateStr).toUpperCase() === todayLabel;
      }
      return false;
    }

    function reportEntryKey(entry) {
      return [entry && entry.section || '', entry && entry.generatedAt || ''].join('|');
    }

    function currentReportKeys(rows) {
      var keys = {};
      if (reportData && reportData.generatedAtBySection) {
        Object.keys(reportData.generatedAtBySection).forEach(function (section) {
          keys[[section, reportData.generatedAtBySection[section]].join('|')] = true;
        });
      }
      rows.forEach(function (entry) {
        if (!entry || !entry.section || !entry.generatedAt) return;
        var section = entry.section;
        var existingKey = Object.keys(keys).find(function (key) {
          return key.indexOf(section + '|') === 0;
        });
        if (!existingKey) keys[reportEntryKey(entry)] = true;
      });
      return keys;
    }

    function logEntryDayKey(entry) {
      if (entry.generatedDateKey) return entry.generatedDateKey;
      if (entry.generatedAt) {
        var ts = new Date(entry.generatedAt);
        if (!Number.isNaN(ts.getTime())) return dateKey(ts);
      }
      return null;
    }

    /* Collapse entries for the same section on the same day down to the most
       recently generated one, so stale duplicates cached in localStorage
       before the same-day gate existed don't keep resurfacing on merge. */
    function dedupeSameDayEntries(rows) {
      var bestByKey = {};
      var undated = [];
      rows.forEach(function (entry) {
        if (!entry || !entry.section) return;
        var day = logEntryDayKey(entry);
        if (!day) { undated.push(entry); return; }
        var key = entry.section + ':' + day;
        var existing = bestByKey[key];
        if (!existing || new Date(entry.generatedAt || 0) > new Date(existing.generatedAt || 0)) {
          bestByKey[key] = entry;
        }
      });
      return Object.keys(bestByKey).map(function (key) {
        return bestByKey[key];
      }).concat(undated).sort(function (a, b) {
        return new Date(b.generatedAt || 0) - new Date(a.generatedAt || 0);
      });
    }

    function mergeLogEntries(serverLog) {
      var map = {};
      readLocalLog().concat(serverLog || []).forEach(function (entry) {
        if (!entry || !entry.generatedAt) return;
        var key = logEntryKey(entry);
        var existing = map[key];
        if (!existing || (!existing.content && entry.content)) {
          map[key] = entry;
        }
      });
      var rows = dedupeSameDayEntries(Object.keys(map).map(function (key) {
        return map[key];
      })).sort(function (a, b) {
        return new Date(b.generatedAt || 0) - new Date(a.generatedAt || 0);
      });
      writeLocalLog(rows);
      return rows;
    }

    function syncLocalLogToServer(serverLog) {
      if (localLogSynced) return Promise.resolve(null);
      localLogSynced = true;
      var serverKeys = {};
      (serverLog || []).forEach(function (entry) {
        serverKeys[logEntryKey(entry)] = true;
      });
      var entries = readLocalLog().filter(function (entry) {
        return entry && entry.content && entry.generatedAt && !serverKeys[logEntryKey(entry)];
      }).slice(0, 25);
      if (!entries.length) return Promise.resolve(null);
      // Background sync — attach the admin key only if one is already stored,
      // never prompt on load, and tolerate 401/503 for anonymous viewers.
      return AdminKey.fetchSilent('/api/daily-report/logs/import?ttlHours=' + currentTtl(), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ entries: entries })
      })
        .then(readApiJson)
        .catch(function () { return null; });
    }

    function renderLog(log) {
      var el = document.getElementById('reporterLog');
      if (!el) return;
      var rows = mergeLogEntries(log).slice(0, 25);
      generationLogEntries = rows;
      if (!rows.length) {
        el.style.display = 'none';
        el.innerHTML = '';
        return;
      }
      el.style.display = 'block';
      var currentKeys = currentReportKeys(rows);
      var currentRows = rows.filter(function (entry) {
        return currentKeys[reportEntryKey(entry)] || isCurrentLogEntry(entry);
      });
      var pastRows = rows.filter(function (entry) {
        return !currentKeys[reportEntryKey(entry)] && !isCurrentLogEntry(entry);
      });

      function renderRows(groupRows, isPast) {
        if (!groupRows.length) return '<div class="reporter-log-empty">No saved reports here yet.</div>';
        return groupRows.map(function (entry) {
          var index = rows.indexOf(entry);
        var ts = entry.generatedAt ? new Date(entry.generatedAt) : null;
        var when = ts ? ts.toLocaleString(undefined, {
          month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit'
        }) : 'timestamp unavailable';
        var readable = !!entry.content;
        var sectionClass = !isPast && entry.section ? ' ' + entry.section : '';
        return '<button class="reporter-log-item' + (isPast ? ' past' : '') + sectionClass + '" type="button" data-log-index="' + index + '"' +
          (readable ? '' : ' aria-disabled="true"') + '>' +
          '<span class="reporter-log-name">' +
          '<span class="reporter-log-label">' + esc(entry.label || entry.section || 'Reporter') + '</span>' +
          '<span class="reporter-log-status">' + (readable ? 'Saved report available' : 'Timestamp only') + '</span>' +
          '</span>' +
          '<span class="reporter-log-time">' + esc(when) +
          '<span class="reporter-log-read">' + (readable ? 'Read' : 'Unavailable') + '</span>' +
          '</span>' +
          '</button>';
        }).join('');
      }

      el.innerHTML = '<div class="reporter-log-title">Saved reports</div>' +
        '<div class="reporter-log-list">' +
        '<div class="reporter-log-group"><div class="reporter-log-group-title">Current Reports</div>' +
        renderRows(currentRows, false) + '</div>' +
        '<div class="reporter-log-group"><div class="reporter-log-group-title">Past Reports</div>' +
        renderRows(pastRows, true) + '</div>' +
        '</div>';
    }

    function openLogEntry(index) {
      var entry = generationLogEntries[index];
      var content = document.getElementById('reporterContent');
      if (!entry || !content) return;
      activeTab = entry.section || activeTab;
      document.querySelectorAll('.reporter-tab').forEach(function (t) {
        t.classList.toggle('active', t.dataset.tab === activeTab);
      });

      var ts = entry.generatedAt ? new Date(entry.generatedAt) : null;
      var when = ts ? ts.toLocaleString(undefined, {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit'
      }) : 'timestamp unavailable';
      var label = entry.label || tabLabels[entry.section] || 'Reporter';

      if (!entry.content) {
        content.innerHTML = '<div class="reporter-unconfigured">' +
          '<strong>' + esc(label) + ' log is timestamp only</strong><br>' +
          'This row was saved before report text was stored. Generate this page again to create a readable saved log.</div>';
        return;
      }

      var sectionClass = isDateToday(entry.generatedAt) ? entry.section : '';
      content.innerHTML = '<div class="reporter-unconfigured" style="margin-bottom:12px">' +
        '<strong>Saved ' + esc(label) + '</strong><br>' +
        esc(when) + (entry.model ? ' &middot; ' + esc(entry.model) : '') +
        '</div><div class="stories">' + parseToStories(entry.content, sectionClass) + '</div>';
    }

    function applyReport(data) {
      reportData = data;

      var headerRow = document.getElementById('reporterHeaderRow');
      if (headerRow) headerRow.style.display = 'flex';

      var dateEl = document.getElementById('reporterDate');
      if (dateEl && data.dateStr) dateEl.textContent = '🗓️ ' + data.dateStr;

      var genEl = document.getElementById('reporterGen');
      if (genEl && data.generatedAt) {
        var ts = new Date(data.generatedAt);
        genEl.textContent = 'Generated ' + ts.toLocaleString(undefined, {
          month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
      }

      renderLog(data.generationLog);
      if (!data[activeTab] && data.latestSection) {
        setActiveTab(data.latestSection);
        return;
      }
      renderTab(activeTab);
    }

    /* Read-only on page load — never triggers a generation. */
    function loadReport() {
      var content = document.getElementById('reporterContent');
      fetch('/api/daily-report?ttlHours=' + currentTtl())
        .then(readApiJson)
        .then(function (data) {
          if (!data.configured) return showUnconfigured();
          return syncLocalLogToServer(data.generationLog).then(function (syncedData) {
            var resolved = syncedData || data;
            renderLog(resolved.generationLog);
            if (resolved.generated === false || !hasContent(resolved)) return showEmptyState();
            applyReport(resolved);
          });
        })
        .catch(function (err) {
          content.innerHTML =
            '<div class="reporter-error">Failed to load daily report: ' + esc(err.message) + '</div>';
        });
    }

    /* Explicit generation — only on button click. */
    var generating = false;
    function generateReport(sectionOverride) {
      if (generating) return;
      generating = true;
      var regenBtnEl = document.getElementById('reporterRegenBtn');
      if (regenBtnEl) { regenBtnEl.disabled = true; regenBtnEl.textContent = '⚡ Generating…'; }
      var section = sectionOverride || activeTab;
      if (sectionOverride) setActiveTab(sectionOverride);
      var content = document.getElementById('reporterContent');
      content.innerHTML =
        '<div class="reporter-loading"><span class="spinner"></span>' +
        'Generating briefing — this can take up to a minute&hellip;</div>';

      AdminKey.fetch('/api/daily-report/generate?ttlHours=' + currentTtl() + '&section=' + encodeURIComponent(section), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: currentPromptOverride(section) })
      })
        .then(readApiJson)
        .then(function (data) {
          if (!data.configured) return showUnconfigured();
          if (data.rateLimited) return showRateLimited(data);
          if (data.generationSkipped) return showAlreadyGenerated(data);
          if (!hasContent(data)) return showEmptyState();
          applyReport(data);
        })
        .catch(function (err) {
          if (err.status === 429 || isRateLimitMessage(err.message)) {
            content.innerHTML =
              '<div class="reporter-unconfigured"><strong>OpenAI is rate-limited</strong><br>' +
              'No new report was generated. Wait a few minutes before trying again.</div>';
            return;
          }
          content.innerHTML =
            '<div class="reporter-error">Failed to generate report: ' + esc(err.message) + '</div>';
        })
        .finally(function () {
          generating = false;
          if (regenBtnEl) { regenBtnEl.disabled = false; regenBtnEl.textContent = '⚡ Regenerate'; }
        });
    }

    function setActiveTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.reporter-tab').forEach(function (t) {
        t.classList.toggle('active', t.dataset.tab === tab);
        if (t.dataset.tab === 'crypto') t.textContent = 'Emerging Markets';
        if (t.dataset.tab === 'economics') t.textContent = 'Economics Top 10';
        if (t.dataset.tab === 'markets') t.textContent = 'Markets Top 10';
      });
      if (reportData) renderTab(activeTab);
    }

    /* Tab clicks */
    document.getElementById('reporterTabs').addEventListener('click', function (e) {
      var btn = e.target.closest('[data-tab]');
      if (!btn) return;
      if (fixedSection && sectionPages[btn.dataset.tab]) {
        window.location.href = sectionPages[btn.dataset.tab];
        return;
      }
      setActiveTab(btn.dataset.tab);
    });

    var reporterLog = document.getElementById('reporterLog');
    if (reporterLog) reporterLog.addEventListener('click', function (e) {
      var btn = e.target.closest('[data-log-index]');
      if (!btn) return;
      openLogEntry(Number(btn.getAttribute('data-log-index')));
    });

    document.getElementById('reporterContent').addEventListener('click', function (e) {
      if (e.target.closest('.reporter-generate-cta')) generateReport();
    });
    var regenBtn = document.getElementById('reporterRegenBtn');
    if (regenBtn) regenBtn.addEventListener('click', function () { generateReport(); });
    configurePageShell();
    setActiveTab(activeTab);

    loadReport();
  })();
</script>
</body>
</html>
